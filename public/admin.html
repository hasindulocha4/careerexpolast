<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Career Expo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

  <div id="loginScreen" class="flex min-h-screen items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-lg shadow-sm border border-gray-200 p-8">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-semibold text-gray-800">Admin Access</h1>
        <p class="text-gray-500 text-sm mt-1">Please enter the master password.</p>
      </div>
      <form id="loginForm" class="space-y-4">
        <div>
          <input type="password" id="passwordInput" required placeholder="Enter Password" class="w-full bg-gray-50 border border-gray-300 rounded-md px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
        </div>
        <button type="submit" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-medium py-2.5 rounded-md transition-colors">
          Unlock Dashboard
        </button>
      </form>
      <div id="loginError" class="mt-4 text-sm text-red-600 text-center hidden">Incorrect password. Please try again.</div>
    </div>
  </div>

  <div id="dashboardScreen" class="hidden p-6 md:p-10 max-w-7xl mx-auto space-y-6">
    
    <header class="flex flex-col sm:flex-row sm:items-center justify-between pb-4 border-b border-gray-200 gap-4">
      <div>
        <h1 class="text-2xl font-semibold text-gray-800">Team Progress Dashboard</h1>
        <p class="text-gray-500 text-sm mt-1">Overview of all submitted task updates.</p>
      </div>
      <div class="flex gap-3">
        <button id="exportBtn" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          Export Excel
        </button>
        <button id="refreshBtn" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-medium px-4 py-2 rounded-md transition-colors shadow-sm">
          Refresh Data
        </button>
        <button id="logoutBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium px-4 py-2 rounded-md transition-colors">
          Lock
        </button>
      </div>
    </header>

    <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wider">
              <th class="py-3 px-4 w-24">Date</th>
              <th class="py-3 px-4 w-32">Member</th>
              <th class="py-3 px-4 w-40">Team</th>
              <th class="py-3 px-4 w-28">Status</th>
              <th class="py-3 px-4">Update Details</th>
              <th class="py-3 px-4">Issues</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="text-sm divide-y divide-gray-100 text-gray-700">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // UI Elements
    const loginScreen = document.getElementById('loginScreen');
    const dashboardScreen = document.getElementById('dashboardScreen');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const tableBody = document.getElementById('tableBody');
    
    // Global variable to hold data for Excel export
    let currentDataToExport = [];

    // Check if user is already logged in during this session
    let sessionPassword = sessionStorage.getItem('adminToken');
    if (sessionPassword) {
      attemptLogin(sessionPassword);
    }

    // Handle Login Form Submission
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const pwd = document.getElementById('passwordInput').value;
      attemptLogin(pwd);
    });

    // Handle Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('adminToken');
      dashboardScreen.classList.add('hidden');
      loginScreen.classList.remove('hidden');
      document.getElementById('passwordInput').value = '';
    });

    // Helper: Color code badges
    function getStatusBadge(statusText) {
      const s = (statusText || '').toLowerCase();
      if (s === 'completed') return `<span class="px-2 py-1 rounded text-xs font-medium bg-green-100 text-green-800">Completed</span>`;
      if (s === 'ongoing') return `<span class="px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-800">Ongoing</span>`;
      if (s === 'on hold') return `<span class="px-2 py-1 rounded text-xs font-medium bg-yellow-100 text-yellow-800">On Hold</span>`;
      return `<span class="text-gray-500 text-xs">${statusText || '-'}</span>`;
    }

    // Main Fetch Engine
    async function attemptLogin(password) {
      loginError.classList.add('hidden');
      if(tableBody) tableBody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-gray-500">Authenticating and fetching records...</td></tr>`;
      
      try {
        const response = await fetch('/api/data', {
          headers: {
            'x-admin-password': password
          }
        });

        if (response.status === 401) {
          sessionStorage.removeItem('adminToken');
          loginError.classList.remove('hidden');
          return;
        }

        if (!response.ok) throw new Error('Network error');

        // Success! Save password in session so they don't have to re-enter it on refresh
        sessionStorage.setItem('adminToken', password);
        loginScreen.classList.add('hidden');
        dashboardScreen.classList.remove('hidden');
        
        const payload = await response.json();
        const dataRows = payload.data || [];

        if (dataRows.length <= 1) {
          tableBody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-gray-500">No records found.</td></tr>`;
          currentDataToExport = [];
          return;
        }

        // Save data for Excel Export
        currentDataToExport = dataRows;

        tableBody.innerHTML = '';
        const entries = dataRows.slice(1).reverse();

        entries.forEach((row) => {
          const tr = document.createElement('tr');
          tr.className = "hover:bg-gray-50 transition-colors";
          tr.innerHTML = `
            <td class="py-3 px-4 text-gray-500 whitespace-nowrap">${row[0] || '-'}</td>
            <td class="py-3 px-4 font-medium text-gray-900 whitespace-nowrap">${row[1] || '-'}</td>
            <td class="py-3 px-4 text-gray-600 whitespace-nowrap">${row[2] || '-'}</td>
            <td class="py-3 px-4 whitespace-nowrap">${getStatusBadge(row[3])}</td>
            <td class="py-3 px-4 text-gray-600 max-w-[200px] truncate" title="${row[4] || ''}">${row[4] || '-'}</td>
            <td class="py-3 px-4 text-red-600 max-w-[150px] truncate" title="${row[5] || ''}">${row[5] || '-'}</td>
          `;
          tableBody.appendChild(tr);
        });
      } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-red-600">Failed to load data.</td></tr>`;
      }
    }

    // Refresh Button Logic
    document.getElementById('refreshBtn').addEventListener('click', () => {
      if (sessionStorage.getItem('adminToken')) {
        attemptLogin(sessionStorage.getItem('adminToken'));
      }
    });

    // EXCEL / CSV Export Logic
    document.getElementById('exportBtn').addEventListener('click', () => {
      if (currentDataToExport.length === 0) {
        alert("No data available to export.");
        return;
      }

      // Convert array matrix to CSV string
      let csvContent = "data:text/csv;charset=utf-8,";
      
      currentDataToExport.forEach(function(rowArray) {
        // Map over cells, escape quotes, and join with commas
        let row = rowArray.map(cell => {
          let cellText = (cell || "").toString();
          // Escape quotes inside text and wrap the cell in quotes to prevent comma splitting
          return '"' + cellText.replace(/"/g, '""') + '"';
        }).join(",");
        csvContent += row + "\r\n";
      });

      // Create a hidden link and trigger download
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      
      // Name the file based on the date
      const dateString = new Date().toISOString().split('T')[0];
      link.setAttribute("download", `Expo_Tracker_${dateString}.xlsx`);
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

  </script>
</body>
</html>
